<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where2Go - Restroom Finder</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <nav>
        <div class="logo"><img src="https://img.icons8.com/ios-filled/48/267373/toilet.png" alt="Toilet Icon" style="vertical-align:middle;width:32px;height:32px;margin-right:8px;">Where2Go</div>
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="finder.html" class="active">Finder</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>
    <main>
        <div class="finder-container">
            <aside class="sidebar">
                <h2>Restroom Finder</h2>
                <img src="toilet.png" alt="Toilet bowl icon" class="finder-icon">
                <div class="search-bar">
                    <input type="text" id="address-input" placeholder="Enter an address or location...">
                    <button id="search-btn">Search</button>
                    <button id="myloc-btn">Use My Location</button>
                </div>
                <div class="filters">
                    <label for="distance-filter">Distance:</label>
                    <select id="distance-filter">
                        <option value="1000">1 mile</option>
                        <option value="5000">5 miles</option>
                        <option value="20000">20 miles</option>
                    </select>
                    <label for="accessible-filter">Wheelchair Accessible:</label>
                    <select id="accessible-filter">
                        <option value="any">Any</option>
                        <option value="yes">Yes</option>
                    </select>
                </div>
                <div id="restroom-list"></div>
            </aside>
            <section class="map-area" style="position:relative;">
                <div id="map" style="width: 100%; height: 500px; border-radius: 8px;"></div>
                <button id="map-locate-btn" title="Go to my location" style="position: absolute; top: 78px; left: 10px; z-index: 1000; background: #fff; border: 1px solid #bbb; border-radius: 0; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; box-shadow: none;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="7"/>
                        <line x1="12" y1="5" x2="12" y2="8"/>
                        <line x1="12" y1="16" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="8" y2="12"/>
                        <line x1="16" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </section>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 Where2Go. All rights reserved.</p>
    </footer>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
