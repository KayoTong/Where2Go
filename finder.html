<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Where2Go - Restroom Finder</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

  <nav>
    <div class="logo">
      <div class="logo-group">
        <img src="https://www.freeiconspng.com/thumbs/restroom-icon/man-and-women-restroom-icon-12.png" alt="Toilet Icon">
        <span>Where2Go</span>
      </div>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main>
    <div class="finder-container">

      <!-- MAP ON TOP-->
      <section class="map-area">
        <div id="map"></div>
        <button id="map-locate-btn" title="Go to my location">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="7"/>
            <line x1="12" y1="5" x2="12" y2="8"/>
            <line x1="12" y1="16" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="8" y2="12"/>
            <line x1="16" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </section>

      <!-- RESTROOM FINDER SECTION BELOW -->
      <aside class="sidebar">
        <h2>Restroom Finder</h2>
        <img src="https://cdn-icons-png.flaticon.com/512/194/194483.png" alt="Toilet bowl icon" class="finder-icon">
        <div class="search-bar">
            <button id="myloc-btn" class="finder-button-small">Use My Location</button>
            <input type="text" id="address-input" placeholder="Enter an address or location...">
            <button id="search-btn" class="finder-button-small">Search</button>
        </div>
        <div class="filters">
          <label for="distance-filter">Distance:</label>
          <select id="distance-filter">
            <option value="1000">1 mile</option>
            <option value="5000">5 miles</option>
            <option value="20000">20 miles</option>
          </select>
          <label for="accessible-filter">Wheelchair Accessible:</label>
          <select id="accessible-filter">
            <option value="any">Any</option>
            <option value="yes">Yes</option>
          </select>
        </div>
        <div id="restroom-list"></div>
      </aside>

    </div>
  </main>

  <footer>
    <p>&copy; 2024 Where2Go. All rights reserved.</p>
  </footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
